name: DocuMind AI — CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend — Lint & Test
  # ─────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: backend
        run: |
          pip install flake8
          # Stop if there are syntax errors or undefined names; ignore line-length warnings
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Verify FastAPI app imports correctly
        working-directory: backend
        env:
          GEMINI_API_KEY: placeholder
          PINECONE_API_KEY: placeholder
          PINECONE_INDEX_NAME: documind
          GEMINI_MODEL_NAME: gemini-2.5-flash
        run: python -c "from app.main import app; print('✅ Backend app imported successfully')"

  # ─────────────────────────────────────────────
  # JOB 2: Frontend — Type-check & Build
  # ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (TypeScript + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Deploy — Trigger Render auto-deploy
  # Runs only on pushes to main/master after CI passes
  # ─────────────────────────────────────────────
  deploy-notify:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render backend deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -s "$HOOK_URL" -X POST -d '' --fail \
              && echo "✅ Backend deploy triggered on Render"
          else
            echo "⚠️  RENDER_BACKEND_DEPLOY_HOOK secret not set — skipping"
          fi

      - name: Trigger Render frontend deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -s "$HOOK_URL" -X POST -d '' --fail \
              && echo "✅ Frontend deploy triggered on Render"
          else
            echo "⚠️  RENDER_FRONTEND_DEPLOY_HOOK secret not set — skipping"
          fi

      - name: Deployment summary
        run: |
          echo "🚀 DocuMind AI deployment triggered"
          echo "Commit : ${{ github.sha }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Actor  : ${{ github.actor }}"

